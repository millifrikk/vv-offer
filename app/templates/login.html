<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innskráning - VV Tilboðsgreining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { vv: { navy: '#1a2744', dark: '#0f1a2e' } } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-vv-navy min-h-screen flex items-center justify-center font-[Inter,system-ui,sans-serif]">
    <div class="w-full max-w-sm mx-4">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 mb-4">
                <div class="w-8 h-8 bg-white rounded flex items-center justify-center">
                    <span class="text-vv-navy font-extrabold text-sm">V</span>
                </div>
                <span class="text-white font-semibold tracking-wide uppercase">Vatnsvirkinn</span>
            </div>
            <p class="text-white/40 text-sm">Tilboðsgreining</p>
        </div>

        <div class="bg-white rounded-xl p-6">
            {% if error %}
            <div class="bg-red-50 text-red-600 text-sm px-4 py-2.5 rounded-lg mb-4">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Netfang</label>
                    <input type="email" name="email" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-vv-navy/20 focus:border-vv-navy outline-none"
                           placeholder="netfang@vatnsvirkinn.is">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Lykilorð</label>
                    <input type="password" name="password" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-vv-navy/20 focus:border-vv-navy outline-none"
                           placeholder="Lykilorð">
                </div>
                <button type="submit"
                        class="w-full py-2.5 bg-vv-navy text-white rounded-lg text-sm font-medium hover:bg-vv-dark transition-all">
                    Skrá inn
                </button>
            </form>
        </div>
    </div>
</body>
</html>
